{# کارت موجودی قابل برداشت — داخل ناحیهٔ رفرش #}
<section class="rounded-2xl border border-amber-500/20 bg-gradient-to-br from-[#151c2e] via-[#12161f] to-[#0f1419] overflow-hidden relative vn-gold-glow">
  <div class="absolute inset-0 opacity-40 pointer-events-none" style="background: radial-gradient(ellipse 80% 50% at 15% 50%, rgba(245,158,11,0.12) 0%, transparent 55%), radial-gradient(ellipse 60% 40% at 90% 30%, rgba(251,191,36,0.08) 0%, transparent 50%);"></div>
  <div class="relative p-4 flex gap-4 items-stretch">
    <div class="shrink-0 w-[4.5rem] flex flex-col items-center justify-center">
      <div class="relative w-16 h-16 rounded-2xl bg-slate-900/80 border border-amber-500/25 flex items-center justify-center text-amber-400 text-3xl shadow-inner">
        <i class="fas fa-wallet"></i>
        <span class="absolute -bottom-0.5 -left-0.5 text-amber-300 text-xs"><i class="fas fa-coins"></i></span>
      </div>
    </div>
    <div class="flex-1 min-w-0 flex flex-col justify-center gap-3">
      <div>
        <p class="text-xs font-medium text-slate-400">موجودی قابل برداشت</p>
        <p class="mt-1 text-2xl font-extrabold text-amber-300 tabular-nums tracking-tight">{{ (withdrawable_balance or 0)|toman }}</p>
      </div>
      <button type="button"
              data-open-withdraw-modal
              data-withdrawable-int="{{ (withdrawable_balance or 0)|int }}"
              class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-l from-amber-500 to-amber-400 text-slate-900 text-sm font-bold py-3 shadow-lg shadow-amber-900/25 hover:from-amber-400 hover:to-amber-300 transition">
        <i class="fas fa-wallet text-sm"></i>
        درخواست برداشت
      </button>
      <div class="grid grid-cols-4 gap-1 pt-1 border-t border-white/10">
        <div class="flex flex-col items-center gap-1 py-1 text-center">
          <i class="fas fa-eye text-[11px] text-amber-400/90"></i>
          <span class="text-[9px] leading-tight text-slate-500">شفاف و دقیق</span>
        </div>
        <div class="flex flex-col items-center gap-1 py-1 text-center">
          <i class="fas fa-clock text-[11px] text-amber-400/90"></i>
          <span class="text-[9px] leading-tight text-slate-500">در هر زمان</span>
        </div>
        <div class="flex flex-col items-center gap-1 py-1 text-center">
          <i class="fas fa-shield-alt text-[11px] text-amber-400/90"></i>
          <span class="text-[9px] leading-tight text-slate-500">پرداخت امن</span>
        </div>
        <div class="flex flex-col items-center gap-1 py-1 text-center">
          <i class="fas fa-bolt text-[11px] text-amber-400/90"></i>
          <span class="text-[9px] leading-tight text-slate-500">واریز سریع</span>
        </div>
      </div>
    </div>
  </div>
</section>
