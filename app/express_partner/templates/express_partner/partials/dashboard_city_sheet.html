{# شیت انتخاب شهر داشبورد (جایگزین دراپ‌داون) — بعد از </header> قرار دهید #}
<script type="application/json" id="dashCityPickerCitiesJson">{{ cities|tojson }}</script>

<div id="dashCityPickerModal" class="fixed inset-0 z-[85] hidden overflow-y-auto" data-tg-body-modal aria-hidden="true">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-[1px]" data-dash-city-modal-backdrop></div>
  <div class="relative flex min-h-full flex-col justify-end pointer-events-none sm:justify-center sm:p-4">
    <div id="dashCityPickerPanel" role="dialog" aria-modal="true" aria-labelledby="dashCityPickerTitle"
         class="pointer-events-auto mx-auto flex max-h-[92dvh] w-full max-w-md flex-col rounded-t-3xl border border-white/10 bg-[#1a222c] shadow-2xl sm:max-h-[88dvh] sm:rounded-2xl">
      <div class="flex shrink-0 justify-center pt-2 pb-1" aria-hidden="true">
        <span class="h-1 w-10 rounded-full bg-white/20"></span>
      </div>
      <div class="relative flex shrink-0 items-center justify-center border-b border-white/10 px-4 py-3">
        <button type="button" id="dashCityPickerClose" class="absolute left-3 top-1/2 z-10 grid h-9 w-9 -translate-y-1/2 place-items-center rounded-full text-zinc-400 transition hover:bg-white/10 hover:text-white"
                aria-label="بستن">
          <i class="fas fa-times text-lg" aria-hidden="true"></i>
        </button>
        <h2 id="dashCityPickerTitle" class="text-base font-bold text-white">انتخاب شهر</h2>
      </div>

      <div class="flex min-h-0 flex-1 flex-col overflow-hidden px-4 pt-3">
        <div class="relative mb-3 shrink-0">
          <i class="fas fa-magnifying-glass pointer-events-none absolute right-3 top-1/2 z-[1] -translate-y-1/2 text-sm text-zinc-500" aria-hidden="true"></i>
          <input type="text" id="dashCityPickerSearch" inputmode="search" enterkeyhint="search" autocomplete="off" role="searchbox" aria-label="جستجو در شهرها"
                 class="w-full rounded-xl border border-white/10 bg-[#0f1419] py-3 pl-3 pr-11 text-right text-sm text-white outline-none transition placeholder:text-zinc-500 placeholder:text-right focus:border-emerald-500/40 focus:ring-1 focus:ring-emerald-500/25"
                 placeholder="جستجو در شهرها" dir="rtl">
        </div>

        <button type="button" id="dashCityPickerGeoQuick"
                class="mb-4 flex w-full shrink-0 items-center justify-between gap-3 rounded-xl border border-white/10 bg-[#0f1419] px-3 py-3 text-right transition hover:border-emerald-500/30 hover:bg-[#121820]">
          <span class="flex min-w-0 flex-1 items-center justify-end gap-2">
            <span class="min-w-0 text-right">
              <span class="block text-xs font-medium text-emerald-400">موقعیت فعلی</span>
              <span id="dashCityPickerCurrentLabel" class="block truncate text-sm font-semibold text-white">—</span>
            </span>
            <i class="fas fa-location-dot shrink-0 text-lg text-emerald-500" aria-hidden="true"></i>
          </span>
          <span class="grid h-10 w-10 shrink-0 place-items-center rounded-full border border-emerald-500/25 bg-emerald-500/10 text-emerald-400" aria-hidden="true">
            <i class="fas fa-crosshairs"></i>
          </span>
        </button>

        <p class="mb-2 shrink-0 text-right text-xs text-zinc-500">پیشنهادهای نزدیک</p>
        <div id="dashCityPickerChips" class="mb-4 flex max-w-full shrink-0 flex-wrap justify-end gap-2"></div>

        <p class="mb-2 shrink-0 text-right text-xs text-zinc-500">همه شهرها</p>
        <div id="dashCityPickerList" class="min-h-[40dvh] flex-1 overflow-y-auto overscroll-contain border-t border-white/10 -mx-4 px-4 pb-2 sm:min-h-0"></div>
      </div>

      <div class="shrink-0 border-t border-white/10 bg-[#1a222c] p-4 pb-[max(1rem,env(safe-area-inset-bottom,0px))]">
        <button type="button" id="dashCityPickerApply"
                class="w-full rounded-xl bg-emerald-600 py-3.5 text-sm font-bold text-white shadow-lg transition hover:bg-emerald-500 active:scale-[0.99]">
          انتخاب شهر
        </button>
      </div>
    </div>
  </div>
</div>
