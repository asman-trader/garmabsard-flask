{# اسکریپت تاریخ شمسی + pull-to-refresh (فقط is_approved) #}
<script>
  (function(){
    function fmt(dt){
      try{
        const d = new Date(String(dt||'').replace(' ','T'));
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString('fa-IR', {
          timeZone: 'Asia/Tehran',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        });
      }catch(_){ return ''; }
    }
    function applyJalali(scope){
      (scope || document).querySelectorAll('.jalali-dt[data-dt]').forEach(function(el){
        const raw = el.getAttribute('data-dt')||'';
        const formatted = fmt(raw);
        el.textContent = formatted || '—';
      });
    }
    applyJalali(document);

    var shell = document.getElementById('commissionsPageShell');
    var mount = document.getElementById('commissionsRefreshMount');
    if (!shell || !mount) return;

    function docScrollTop() {
      try {
        return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
      } catch (_) {
        return 0;
      }
    }

    var PULL_TRIGGER_PX = 72;
    var TOP_EPS = 10;
    var startY = null;
    var maxPull = 0;
    var busy = false;
    var refreshPromise = null;

    function setHint(on) {
      var h = document.getElementById('commissionsPullHint');
      if (!h) return;
      if (on) {
        h.classList.remove('max-h-0', 'opacity-0');
        h.classList.add('max-h-12', 'opacity-100');
      } else {
        h.classList.add('max-h-0', 'opacity-0');
        h.classList.remove('max-h-12', 'opacity-100');
      }
    }

    function performCommissionsRefresh() {
      if (refreshPromise) return refreshPromise;
      setHint(true);
      var spin = document.querySelector('#commissionsPullHint .fa-rotate');
      if (spin) spin.classList.add('fa-spin');
      refreshPromise = fetch(window.location.pathname + window.location.search + (window.location.search ? '&' : '?') + '_refresh=' + Date.now(), {
        method: 'GET',
        headers: { 'Accept': 'text/html', 'X-Requested-With': 'XMLHttpRequest' },
        cache: 'no-store',
        credentials: 'same-origin'
      }).then(function(res){
        if (!res.ok) throw new Error('bad');
        return res.text();
      }).then(function(html){
        var doc = new DOMParser().parseFromString(html, 'text/html');
        var next = doc.getElementById('commissionsRefreshMount');
        if (next && mount) mount.innerHTML = next.innerHTML;
        applyJalali(mount);
      }).catch(function(){})
      .finally(function(){
        if (spin) spin.classList.remove('fa-spin');
        setHint(false);
        refreshPromise = null;
      });
      return refreshPromise;
    }

    function pullEnabled() {
      try { return window.matchMedia('(max-width: 1023px)').matches; } catch (_) { return true; }
    }

    shell.addEventListener('touchstart', function(e){
      if (!pullEnabled() || busy || !e.touches || e.touches.length !== 1) return;
      if (!shell.contains(e.target)) return;
      if (docScrollTop() > TOP_EPS) return;
      startY = e.touches[0].clientY;
      maxPull = 0;
    }, { passive: true });

    shell.addEventListener('touchmove', function(e){
      if (!pullEnabled() || startY == null || !e.touches || e.touches.length !== 1) return;
      if (docScrollTop() > TOP_EPS) { startY = null; maxPull = 0; setHint(false); return; }
      var dy = e.touches[0].clientY - startY;
      if (dy > 0) {
        maxPull = Math.max(maxPull, dy);
        setHint(maxPull > 48);
      }
    }, { passive: true });

    shell.addEventListener('touchend', function(){
      if (!pullEnabled() || startY == null) return;
      var ok = maxPull >= PULL_TRIGGER_PX && docScrollTop() <= TOP_EPS;
      startY = null;
      maxPull = 0;
      setHint(false);
      if (!ok || busy) return;
      busy = true;
      performCommissionsRefresh().finally(function(){ busy = false; });
    }, { passive: true });

    shell.addEventListener('touchcancel', function(){
      if (!pullEnabled()) return;
      startY = null; maxPull = 0; setHint(false);
    }, { passive: true });
  })();
</script>
