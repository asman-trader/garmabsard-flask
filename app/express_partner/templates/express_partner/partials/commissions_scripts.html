{# اسکریپت تاریخ شمسی + pull-to-refresh (فقط is_approved) #}
<script>
  (function(){
    function fmt(dt){
      try{
        const d = new Date(String(dt||'').replace(' ','T'));
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString('fa-IR', {
          timeZone: 'Asia/Tehran',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        });
      }catch(_){ return ''; }
    }
    function applyJalali(scope){
      (scope || document).querySelectorAll('.jalali-dt[data-dt]').forEach(function(el){
        const raw = el.getAttribute('data-dt')||'';
        const formatted = fmt(raw);
        el.textContent = formatted || '—';
      });
    }
    applyJalali(document);

    var main = document.getElementById('commissionsPageMain');
    var mount = document.getElementById('commissionsRefreshMount');
    if (!main || !mount) return;

    /* موبایل: اسکرول داخل #commissionsPageMain است؛ دسکتاپ: اسکرول سند */
    function commissionsPullScrollTop() {
      try {
        if (window.matchMedia('(max-width: 1023px)').matches && main) {
          return main.scrollTop || 0;
        }
      } catch (_) {}
      try {
        var a = typeof window.scrollY === 'number' && !isNaN(window.scrollY) ? window.scrollY : 0;
        var b = typeof window.pageYOffset === 'number' && !isNaN(window.pageYOffset) ? window.pageYOffset : 0;
        var se = document.scrollingElement;
        var c = se && typeof se.scrollTop === 'number' && !isNaN(se.scrollTop) ? se.scrollTop : 0;
        var d = document.documentElement ? document.documentElement.scrollTop || 0 : 0;
        var e = document.body ? document.body.scrollTop || 0 : 0;
        return Math.max(a, b, c, d, e);
      } catch (_) {
        return 0;
      }
    }

    var PULL_TRIGGER_PX = 72;
    var TOP_EPS = 10;
    var startY = null;
    var maxPull = 0;
    var busy = false;
    var refreshPromise = null;

    function setHint(on) {
      var h = document.getElementById('commissionsPullHint');
      if (!h) return;
      if (on) {
        h.classList.remove('max-h-0', 'opacity-0');
        h.classList.add('max-h-12', 'opacity-100');
      } else {
        h.classList.add('max-h-0', 'opacity-0');
        h.classList.remove('max-h-12', 'opacity-100');
      }
    }

    function performCommissionsRefresh() {
      if (refreshPromise) return refreshPromise;
      setHint(true);
      var spin = document.querySelector('#commissionsPullHint .fa-rotate');
      if (spin) spin.classList.add('fa-spin');
      refreshPromise = fetch(window.location.pathname + window.location.search + (window.location.search ? '&' : '?') + '_refresh=' + Date.now(), {
        method: 'GET',
        headers: { 'Accept': 'text/html', 'X-Requested-With': 'XMLHttpRequest' },
        cache: 'no-store',
        credentials: 'same-origin'
      }).then(function(res){
        if (!res.ok) throw new Error('bad');
        return res.text();
      }).then(function(html){
        var doc = new DOMParser().parseFromString(html, 'text/html');
        var next = doc.getElementById('commissionsRefreshMount');
        if (next && mount) mount.innerHTML = next.innerHTML;
        applyJalali(mount);
      }).catch(function(){})
      .finally(function(){
        if (spin) spin.classList.remove('fa-spin');
        setHint(false);
        refreshPromise = null;
      });
      return refreshPromise;
    }

    function pullEnabled() {
      try { return window.matchMedia('(max-width: 1023px)').matches; } catch (_) { return true; }
    }

    /* لم روی محتوای main تا با لمس هدر fixed تداخل نکند */
    main.addEventListener('touchstart', function(e){
      if (!pullEnabled() || busy || !e.touches || e.touches.length !== 1) return;
      if (!main.contains(e.target)) return;
      if (commissionsPullScrollTop() > TOP_EPS) return;
      startY = e.touches[0].clientY;
      maxPull = 0;
    }, { passive: true });

    main.addEventListener('touchmove', function(e){
      if (!pullEnabled() || startY == null || !e.touches || e.touches.length !== 1) return;
      if (commissionsPullScrollTop() > TOP_EPS) { startY = null; maxPull = 0; setHint(false); return; }
      var dy = e.touches[0].clientY - startY;
      /* حرکت به سمت بالا = اسکرول محتوا به سمت بالا؛ حالت pull را رها کن تا با اسکرول سند تداخل نکند */
      if (dy < -12) { startY = null; maxPull = 0; setHint(false); return; }
      if (dy > 0) {
        maxPull = Math.max(maxPull, dy);
        setHint(maxPull > 48);
      }
    }, { passive: true });

    main.addEventListener('touchend', function(){
      if (!pullEnabled() || startY == null) return;
      var ok = maxPull >= PULL_TRIGGER_PX && commissionsPullScrollTop() <= TOP_EPS;
      startY = null;
      maxPull = 0;
      setHint(false);
      if (!ok || busy) return;
      busy = true;
      performCommissionsRefresh().finally(function(){ busy = false; });
    }, { passive: true });

    main.addEventListener('touchcancel', function(){
      if (!pullEnabled()) return;
      startY = null; maxPull = 0; setHint(false);
    }, { passive: true });
  })();
</script>

<script>
  (function () {
    var modal = document.getElementById('vnWithdrawModal');
    if (!modal) return;

    var bankModal = document.getElementById('vnBankPickerModal');
    var bankSummaryEl = document.getElementById('vnWithdrawBankSummary');
    var bankConfirm = document.getElementById('vnBankPickerConfirmBtn');

    var balanceEl = document.getElementById('vnWithdrawModalBalance');
    var input = document.getElementById('vnWithdrawAmountInput');
    var fillAll = document.getElementById('vnWithdrawFillAllBtn');
    var submit = document.getElementById('vnWithdrawSubmitBtn');
    var supportUrl = (modal.getAttribute('data-support-url') || '').trim();

    var maxWithdraw = 0;
    var selectedBankSummary = '';

    function toFaDigits(s) {
      var p = '۰۱۲۳۴۵۶۷۸۹';
      return String(s || '').replace(/[0-9]/g, function (d) { return p[parseInt(d, 10)]; });
    }

    function formatToman(n) {
      var v = Math.max(0, parseInt(String(n || '0'), 10) || 0);
      if (v === 0) return '۰ تومان';
      var raw = String(v);
      var rev = raw.split('').reverse().join('');
      var parts = [];
      for (var i = 0; i < rev.length; i += 3) {
        parts.push(rev.slice(i, i + 3));
      }
      var joined = parts.join('،').split('').reverse().join('');
      return toFaDigits(joined) + ' تومان';
    }

    function parseInputDigits() {
      var t = (input && input.value) ? input.value.replace(/[^\d]/g, '') : '';
      return parseInt(t || '0', 10) || 0;
    }

    function setInputFromInt(n) {
      if (!input) return;
      var v = Math.max(0, Math.min(maxWithdraw, parseInt(String(n || '0'), 10) || 0));
      input.value = v > 0 ? String(v) : '';
    }

    function syncSubmitHref() {
      if (!submit || !supportUrl) return;
      var amt = parseInputDigits();
      try {
        var u = new URL(supportUrl, window.location.origin);
        if (amt > 0) u.searchParams.set('withdraw_amount', String(amt));
        if (selectedBankSummary) u.searchParams.set('bank_account', selectedBankSummary);
        submit.setAttribute('href', u.pathname + u.search + u.hash);
      } catch (_) {
        var q = [];
        if (amt > 0) q.push('withdraw_amount=' + encodeURIComponent(String(amt)));
        if (selectedBankSummary) q.push('bank_account=' + encodeURIComponent(selectedBankSummary));
        var joiner = supportUrl.indexOf('?') >= 0 ? '&' : '?';
        submit.setAttribute('href', supportUrl + (q.length ? joiner + q.join('&') : ''));
      }
    }

    function bankPickerOpen() {
      return bankModal && bankModal.classList.contains('vn-bank-picker-modal--open');
    }

    function closeBankPicker() {
      if (!bankModal) return;
      bankModal.classList.remove('vn-bank-picker-modal--open');
      window.setTimeout(function () {
        bankModal.classList.add('hidden');
      }, 280);
      bankModal.setAttribute('aria-hidden', 'true');
    }

    function forceCloseBankPicker() {
      if (!bankModal) return;
      bankModal.classList.remove('vn-bank-picker-modal--open');
      bankModal.classList.add('hidden');
      bankModal.setAttribute('aria-hidden', 'true');
    }

    function openBankPicker() {
      if (!bankModal) return;
      bankModal.classList.remove('hidden');
      bankModal.setAttribute('aria-hidden', 'false');
      try {
        void bankModal.offsetWidth;
      } catch (_) {}
      bankModal.classList.add('vn-bank-picker-modal--open');
    }

    function markBankSelected(row) {
      if (!bankModal) return;
      bankModal.querySelectorAll('.vn-bank-account').forEach(function (el) {
        el.classList.remove('vn-bank-account--selected', 'ring-2', 'ring-emerald-500/35', 'border-emerald-500/40');
        el.classList.add('border-white/10');
      });
      if (row) {
        row.classList.add('vn-bank-account--selected', 'ring-2', 'ring-emerald-500/35', 'border-emerald-500/40');
        row.classList.remove('border-white/10');
      }
    }

    function pickDefaultBankRow() {
      if (!bankModal) return null;
      var list = bankModal.querySelectorAll('.vn-bank-account');
      var def = bankModal.querySelector('.vn-bank-account[data-bank-default="1"]');
      return def || (list.length ? list[0] : null);
    }

    function openModal(fromBtn) {
      var raw = fromBtn && fromBtn.getAttribute('data-withdrawable-int');
      maxWithdraw = Math.max(0, parseInt(String(raw || '0'), 10) || 0);
      if (balanceEl) balanceEl.textContent = formatToman(maxWithdraw);
      setInputFromInt(0);
      syncSubmitHref();
      modal.classList.remove('hidden');
      modal.setAttribute('aria-hidden', 'false');
      try {
        void modal.offsetWidth;
      } catch (_) {}
      modal.classList.add('vn-withdraw-modal--open');
      try {
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      } catch (_) {}
      requestAnimationFrame(function () {
        try { if (input) input.focus(); } catch (_) {}
      });
    }

    function closeModal() {
      forceCloseBankPicker();
      modal.classList.remove('vn-withdraw-modal--open');
      window.setTimeout(function () {
        modal.classList.add('hidden');
      }, 280);
      modal.setAttribute('aria-hidden', 'true');
      try {
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
      } catch (_) {}
    }

    document.addEventListener('click', function (e) {
      var t = e.target;
      if (!t || !t.closest) return;
      if (t.closest('[data-open-withdraw-modal]')) {
        e.preventDefault();
        openModal(t.closest('[data-open-withdraw-modal]'));
        return;
      }
      if (t.closest('[data-open-bank-picker]')) {
        e.preventDefault();
        var row0 = pickDefaultBankRow();
        markBankSelected(row0);
        openBankPicker();
        return;
      }
      if (t.closest('[data-close-bank-picker]')) {
        e.preventDefault();
        closeBankPicker();
        return;
      }
      if (t.closest('[data-close-withdraw-modal]')) {
        e.preventDefault();
        closeModal();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Escape') return;
      if (bankPickerOpen()) {
        e.preventDefault();
        closeBankPicker();
        return;
      }
      if (modal.classList.contains('vn-withdraw-modal--open')) {
        closeModal();
      }
    });

    if (bankModal) {
      bankModal.querySelectorAll('.vn-bank-account').forEach(function (row) {
        row.addEventListener('click', function (e) {
          e.preventDefault();
          markBankSelected(row);
        });
      });
    }

    if (bankConfirm) {
      bankConfirm.addEventListener('click', function (e) {
        e.preventDefault();
        var row = bankModal && bankModal.querySelector('.vn-bank-account--selected');
        var sum = row && row.getAttribute('data-bank-summary');
        if (sum && bankSummaryEl) {
          selectedBankSummary = sum;
          bankSummaryEl.textContent = sum;
        }
        syncSubmitHref();
        closeBankPicker();
      });
    }

    if (fillAll) {
      fillAll.addEventListener('click', function () {
        setInputFromInt(maxWithdraw);
        syncSubmitHref();
      });
    }

    modal.querySelectorAll('.vn-withdraw-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        var add = parseInt(chip.getAttribute('data-chip') || '0', 10) || 0;
        var cur = parseInputDigits();
        setInputFromInt(cur + add);
        syncSubmitHref();
      });
    });

    if (input) {
      input.addEventListener('input', function () {
        var digits = (input.value || '').replace(/[^\d]/g, '');
        var v = parseInt(digits || '0', 10) || 0;
        if (maxWithdraw > 0 && v > maxWithdraw) v = maxWithdraw;
        input.value = v > 0 ? String(v) : '';
        syncSubmitHref();
      });
    }
  })();
</script>
