{# مودال درخواست برداشت — bottom sheet (هماهنگ با طرح موبایل) #}
<div id="vnWithdrawModal"
     class="vn-withdraw-modal fixed inset-0 z-[200] hidden flex flex-col justify-end"
     role="dialog"
     aria-modal="true"
     aria-hidden="true"
     aria-labelledby="vnWithdrawModalTitle"
     data-support-url="{{ url_for('express_partner.support') }}">
  <div class="vn-withdraw-backdrop absolute inset-0 bg-black/60 opacity-0 transition-opacity duration-200"
       data-close-withdraw-modal aria-hidden="true"></div>
  <div class="vn-withdraw-sheet relative w-full max-w-lg mx-auto rounded-t-3xl bg-[#1C1F2A] border-t border-white/10 shadow-[0_-12px_40px_rgba(0,0,0,0.45)] max-h-[min(92vh,720px)] flex flex-col translate-y-full transition-transform duration-300 ease-out">
    <div class="shrink-0 pt-2 pb-1 flex justify-center">
      <span class="block w-10 h-1 rounded-full bg-white/20" aria-hidden="true"></span>
    </div>
    <div class="shrink-0 px-4 pb-2 flex items-center justify-center relative min-h-[2.5rem]">
      <button type="button"
              class="absolute top-1/2 -translate-y-1/2 right-3 w-9 h-9 rounded-full border border-white/10 text-slate-300 hover:bg-white/5 flex items-center justify-center transition"
              data-close-withdraw-modal
              aria-label="بستن">
        <i class="fas fa-times text-sm"></i>
      </button>
      <h2 id="vnWithdrawModalTitle" class="text-[15px] font-bold text-white">درخواست برداشت</h2>
    </div>
    <div class="px-4 pb-5 overflow-y-auto flex-1 min-h-0 space-y-5">
      {# موجودی #}
      <div class="rounded-2xl bg-[#12141D] border border-white/8 px-3 py-3 flex items-stretch gap-3">
        <div class="shrink-0 flex items-center justify-center w-14">
          <div class="relative text-amber-400 text-3xl leading-none">
            <i class="fas fa-wallet"></i>
            <span class="absolute -bottom-1 -start-1 text-amber-300 text-xs opacity-90"><i class="fas fa-coins"></i></span>
          </div>
        </div>
        <div class="flex-1 min-w-0 flex flex-col justify-center text-start">
          <p class="text-xs font-medium text-slate-400">موجودی قابل برداشت</p>
          <p id="vnWithdrawModalBalance" class="mt-1 text-xl font-extrabold text-emerald-400 tabular-nums tracking-tight">{{ (withdrawable_balance or 0)|toman }}</p>
        </div>
      </div>

      {# مبلغ برداشت #}
      <div class="space-y-2">
        <label for="vnWithdrawAmountInput" class="block text-xs font-semibold text-slate-400 text-start">مبلغ برداشت</label>
        <div dir="ltr" class="flex items-stretch gap-2 w-full">
          <button type="button"
                  id="vnWithdrawFillAllBtn"
                  class="shrink-0 rounded-xl border-2 border-emerald-500/70 text-emerald-400 text-xs font-bold px-3 py-2 hover:bg-emerald-500/10 transition whitespace-nowrap">
            کل مبلغ
          </button>
          <div class="flex-1 min-w-0 flex flex-row rounded-xl border border-white/12 bg-[#12141D] overflow-hidden focus-within:border-amber-500/40">
            <span class="shrink-0 px-3 flex items-center text-xs text-slate-500 border-r border-white/10">تومان</span>
            <input id="vnWithdrawAmountInput"
                   type="text"
                   inputmode="numeric"
                   autocomplete="off"
                   class="flex-1 min-w-0 bg-transparent text-end text-white text-sm font-medium py-3 px-3 outline-none placeholder:text-slate-600"
                   placeholder="مبلغ را وارد کنید" />
          </div>
        </div>
        <div class="flex flex-wrap gap-2 justify-start" dir="rtl">
          <button type="button" class="vn-withdraw-chip rounded-lg bg-[#2a2d3a] text-white text-xs font-semibold px-3 py-2 border border-white/5 hover:bg-white/10 transition" data-chip="100000">+۱۰۰٬۰۰۰</button>
          <button type="button" class="vn-withdraw-chip rounded-lg bg-[#2a2d3a] text-white text-xs font-semibold px-3 py-2 border border-white/5 hover:bg-white/10 transition" data-chip="200000">+۲۰۰٬۰۰۰</button>
          <button type="button" class="vn-withdraw-chip rounded-lg bg-[#2a2d3a] text-white text-xs font-semibold px-3 py-2 border border-white/5 hover:bg-white/10 transition" data-chip="500000">+۵۰۰٬۰۰۰</button>
          <button type="button" class="vn-withdraw-chip rounded-lg bg-[#2a2d3a] text-white text-xs font-semibold px-3 py-2 border border-white/5 hover:bg-white/10 transition" data-chip="1000000">+۱٬۰۰۰٬۰۰۰</button>
        </div>
      </div>

      {# حساب مقصد #}
      <div class="space-y-2">
        <span class="block text-xs font-semibold text-slate-400 text-start">حساب مقصد</span>
        <button type="button"
                data-open-bank-picker
                class="flex items-center gap-3 w-full rounded-xl border border-white/12 bg-[#12141D] px-3 py-3.5 text-start hover:border-white/20 transition">
          <span class="shrink-0 w-10 h-10 rounded-xl bg-slate-800/80 border border-white/10 flex items-center justify-center text-slate-300">
            <i class="fas fa-university"></i>
          </span>
          <span id="vnWithdrawBankSummary" class="flex-1 min-w-0 text-sm text-slate-300 truncate">انتخاب حساب بانکی</span>
          <i class="fas fa-chevron-left text-slate-500 text-xs shrink-0"></i>
        </button>
      </div>

      <div class="flex items-start gap-2 text-start pt-1">
        <i class="fas fa-shield-alt text-emerald-500 text-sm mt-0.5 shrink-0"></i>
        <p class="text-[11px] leading-relaxed text-slate-400">برداشت‌ها طی ۱ تا ۳ ساعت کاری انجام می‌شود.</p>
      </div>
    </div>
    <div class="shrink-0 px-4 pb-[max(1rem,env(safe-area-inset-bottom))] pt-2 border-t border-white/5 bg-[#1C1F2A]">
      <a id="vnWithdrawSubmitBtn"
         href="{{ url_for('express_partner.support') }}"
         class="flex w-full items-center justify-center gap-2 rounded-2xl bg-amber-400 hover:bg-amber-300 text-slate-900 text-sm font-bold py-3.5 shadow-lg shadow-amber-900/20 transition">
        <i class="fas fa-wallet text-base"></i>
        درخواست برداشت
      </a>
    </div>
  </div>
</div>

<style>
  /* اولویت بالاتر از .hidden تیلویند وقتی مودال باز است */
  #vnWithdrawModal.vn-withdraw-modal--open {
    display: flex !important;
  }
  #vnWithdrawModal.vn-withdraw-modal--open .vn-withdraw-backdrop {
    opacity: 1;
  }
  #vnWithdrawModal.vn-withdraw-modal--open .vn-withdraw-sheet {
    transform: translateY(0);
  }
</style>
