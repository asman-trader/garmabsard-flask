{# هدر پورسانت — هم‌راستا با هدر پروفایل (تیره، h-14/sm:h-16، max-w-6xl) #}
<header id="commissionsPageHeader" data-tour="commissions-header" class="fixed top-0 left-0 right-0 z-50 w-full border-b border-white/10 bg-[#050a0e]/95 backdrop-blur-md pointer-events-none">
  <div class="relative mx-auto flex h-14 max-w-6xl items-center justify-between px-4 sm:h-16 sm:px-6 pointer-events-auto">
    <a href="{{ url_for('express_partner.dashboard') }}"
       class="relative z-10 grid h-10 w-10 shrink-0 place-items-center rounded-full border border-white/10 bg-white/5 text-zinc-400 transition hover:bg-white/10 hover:text-white"
       aria-label="بازگشت">
      <i class="fas fa-arrow-right text-sm sm:text-base" aria-hidden="true"></i>
    </a>
    <h1 class="pointer-events-none absolute inset-x-0 text-center text-sm font-bold text-white sm:text-base">پورسانت‌های من</h1>
    {% set profile_notifications_dark = true %}
    <div class="shrink-0">
      {% include 'express_partner/partials/notifications_button.html' %}
    </div>
  </div>
  <div class="relative mx-auto max-w-6xl px-4 pb-2 sm:px-6 pointer-events-none">
    <p class="text-center text-xs text-zinc-400 flex items-center justify-center gap-1.5 leading-relaxed">
      <span>نمای کلی از عملکرد پورسانت‌های شما</span>
      <i class="fas fa-circle-info text-zinc-500 text-[10px] shrink-0" aria-hidden="true"></i>
    </p>
  </div>
</header>
