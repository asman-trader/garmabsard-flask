<script>
(function () {
  var STORAGE_KEY = 'vinor_dashboard_favs';

  function readFavs() {
    try {
      var a = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      return Array.isArray(a) ? a.map(String) : [];
    } catch (_) {
      return [];
    }
  }

  function writeFavs(arr) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    } catch (_) {}
    try {
      document.dispatchEvent(new CustomEvent('vinor-favs-changed', { detail: { codes: arr } }));
    } catch (_) {}
  }

  function syncFavButtons(scope) {
    var root = scope || document;
    var favs = new Set(readFavs());
    root.querySelectorAll('[data-fav-code]').forEach(function (btn) {
      var code = String(btn.getAttribute('data-fav-code') || '');
      var icon = btn.querySelector('.vinor-fav-icon');
      if (!icon) return;
      var on = favs.has(code);
      icon.classList.toggle('far', !on);
      icon.classList.toggle('fas', on);
      icon.classList.toggle('text-red-400', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  if (!window.__vinorFavGlobalBound) {
    window.__vinorFavGlobalBound = true;
    document.addEventListener('click', function (ev) {
      var btn = ev.target.closest && ev.target.closest('[data-fav-code]');
      if (!btn || !btn.closest('.vinor-premium-card')) return;
      ev.preventDefault();
      ev.stopPropagation();
      var code = String(btn.getAttribute('data-fav-code') || '');
      var a = readFavs();
      var i = a.indexOf(code);
      if (i >= 0) a.splice(i, 1);
      else a.push(code);
      writeFavs(a);
      syncFavButtons();
    }, true);
    document.addEventListener('DOMContentLoaded', function () {
      syncFavButtons();
    });
  }

  window.vinorReadFavs = readFavs;
  window.vinorWriteFavs = writeFavs;
  window.vinorSyncFavButtons = syncFavButtons;
})();
</script>
