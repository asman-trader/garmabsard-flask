{% if assigned_lands and assigned_lands|length > 0 %}
  {% for land in assigned_lands %}
  <div class="w-full max-w-md mx-auto">
    {% include 'express_partner/partials/land_premium_card.html' %}
  </div>
  {% endfor %}
{% else %}
  <div class="rounded-2xl border border-white/10 bg-[#12181f] px-6 py-14 text-center">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full border border-white/10 bg-white/5">
      <i class="far fa-heart text-2xl text-zinc-500" aria-hidden="true"></i>
    </div>
    <p class="text-sm font-semibold text-white">علاقه‌مندی‌ای ثبت نشده</p>
    <p class="mt-2 text-xs text-zinc-500 leading-relaxed">در داشبورد روی آیکن قلب کارت‌ها بزنید تا اینجا نمایش داده شوند.</p>
    <a href="{{ url_for('express_partner.dashboard') }}"
       class="mt-5 inline-flex items-center gap-2 rounded-xl bg-emerald-600 px-4 py-2.5 text-xs font-bold text-white transition hover:bg-emerald-500">
      <i class="fas fa-th-large text-[11px]" aria-hidden="true"></i>
      رفتن به داشبورد
    </a>
  </div>
{% endif %}
