{# نوار دو مرحله‌ای ورود / تأیید کد — login_step: 1 یا 2 #}
<div class="flex items-center justify-center gap-0 px-2" dir="rtl">
  {# مرحله ۱ — سمت راست در RTL #}
  <div class="flex flex-col items-center gap-1.5 min-w-[4.5rem]">
    {% if login_step == 1 %}
      <span class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-500 text-sm font-bold text-white shadow-lg shadow-emerald-500/25 ring-2 ring-emerald-400/40">۱</span>
      <span class="text-xs font-semibold text-emerald-400">ورود</span>
    {% else %}
      <span class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-500 text-white shadow-md shadow-emerald-500/20">
        <i class="fa-solid fa-check text-sm" aria-hidden="true"></i>
      </span>
      <span class="text-xs font-medium text-emerald-500/90">ورود</span>
    {% endif %}
  </div>

  <div class="h-px w-8 sm:w-14 shrink-0 bg-gradient-to-l from-emerald-500/40 to-zinc-600/40 mb-6" aria-hidden="true"></div>

  <div class="flex flex-col items-center gap-1.5 min-w-[4.5rem]">
    {% if login_step == 2 %}
      <span class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-500 text-sm font-bold text-white shadow-lg shadow-emerald-500/25 ring-2 ring-emerald-400/40">۲</span>
      <span class="text-xs font-semibold text-emerald-400">تأیید کد</span>
    {% else %}
      <span class="flex h-10 w-10 items-center justify-center rounded-full border-2 border-zinc-600 bg-zinc-800/80 text-sm font-semibold text-zinc-500">۲</span>
      <span class="text-xs font-medium text-zinc-500">تأیید کد</span>
    {% endif %}
  </div>
</div>
