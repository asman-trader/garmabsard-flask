<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>وینور اکسپرس</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif;
      background: #f9fafb;
      color: #1f2937;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #030712; color: #e5e7eb; }
      .sk-bar { background: #1f2937 !important; }
      .sk-card { background: #1f2937 !important; }
      .sk-tabs {
        border-top-color: rgba(255,255,255,.08);
        background: rgba(17,24,39,.96);
        box-shadow: 0 -10px 36px rgba(0,0,0,.35);
      }
      .sk-tab { background: #374151 !important; }
      .sk-hint { color: #9ca3af !important; }
    }
    @keyframes skPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes skPulse { 0%, 100% { opacity: 1; } }
    }
    .sk-pulse { animation: skPulse 1.15s ease-in-out infinite; }
    .sk-header {
      height: 52px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      background: rgba(255,255,255,.92);
    }
    .sk-bar { height: 12px; border-radius: 8px; background: #e5e7eb; }
    .sk-main { padding: 12px 12px 88px; display: flex; flex-direction: column; gap: 12px; }
    .sk-card { height: 104px; border-radius: 16px; background: #e5e7eb; }
    .sk-card-lg { height: 144px; }
    .sk-tabs {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 56px;
      padding-bottom: env(safe-area-inset-bottom, 0);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,.06);
      background: rgba(255,255,255,.96);
      box-shadow: 0 -8px 28px rgba(15, 23, 42, 0.06);
    }
    .sk-tab { width: 52px; height: 32px; border-radius: 999px; background: #e5e7eb; }
    .sk-footer {
      margin-top: auto;
      padding: 16px 16px calc(72px + env(safe-area-inset-bottom));
      text-align: center;
    }
    .sk-hint { font-size: 13px; line-height: 1.5; color: #6b7280; margin-bottom: 12px; }
    .sk-btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    .sk-btn:active { opacity: 0.9; }
  </style>
</head>
<body>
  <header class="sk-header">
    <div class="sk-bar sk-pulse" style="width:36px;height:36px;border-radius:50%"></div>
    <div class="sk-bar sk-pulse" style="flex:1;max-width:45%;height:14px"></div>
    <div class="sk-bar sk-pulse" style="width:36px;height:36px;border-radius:50%"></div>
  </header>
  <main class="sk-main">
    <div class="sk-card sk-card-lg sk-pulse"></div>
    <div class="sk-card sk-pulse"></div>
    <div class="sk-card sk-pulse"></div>
  </main>
  <nav class="sk-tabs" aria-hidden="true">
    <div class="sk-tab sk-pulse"></div>
    <div class="sk-tab sk-pulse"></div>
    <div class="sk-tab sk-pulse"></div>
    <div class="sk-tab sk-pulse"></div>
  </nav>
  <footer class="sk-footer">
    <p class="sk-hint">صفحه از کش اسکلت بارگذاری شده است. برای دریافت نسخه کامل، اتصال اینترنت را بررسی کنید.</p>
    <button type="button" class="sk-btn" onclick="location.reload()">تلاش مجدد</button>
  </footer>
</body>
</html>
